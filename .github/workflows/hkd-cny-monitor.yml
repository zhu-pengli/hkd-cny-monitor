name: HKD/CNY Monitor

on:
  schedule:
    # 18:15 Asia/Shanghai, Monday-Friday. Frankfurter publishes daily reference rates.
    - cron: "15 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        run: python monitor.py --config config.json --output data/rates.json --summary data/summary.md --github-env "$GITHUB_ENV" --print-summary

      - name: Add run summary
        run: cat data/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rates.json data/summary.md
          git diff --cached --quiet || git commit -m "Update HKD/CNY monitor data"
          git push

      - name: Open or update alert issue
        if: env.HKD_CNY_ALERT == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const title = process.env.HKD_CNY_TITLE || "HKD/CNY 高位提醒";
            const body = fs.readFileSync("data/summary.md", "utf8");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) =>
              !issue.pull_request && issue.title.startsWith("HKD/CNY")
            );
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }

      - name: Send email alert
        if: env.HKD_CNY_ALERT == 'true'
        env:
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.126.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path

          smtp_host = os.environ.get("SMTP_HOST", "smtp.126.com")
          smtp_port = int(os.environ.get("SMTP_PORT", "465"))
          smtp_user = os.environ.get("SMTP_USER")
          smtp_password = os.environ.get("SMTP_PASSWORD")
          email_to = os.environ.get("ALERT_EMAIL_TO")
          title = os.environ.get("HKD_CNY_TITLE", "HKD/CNY 高位提醒")
          body = Path("data/summary.md").read_text(encoding="utf-8")

          missing = [name for name, value in {
              "ALERT_EMAIL_TO": email_to,
              "SMTP_USER": smtp_user,
              "SMTP_PASSWORD": smtp_password,
          }.items() if not value]
          if missing:
              raise SystemExit(
                  "Missing GitHub Actions secret(s): " + ", ".join(missing) +
                  ". Add them in Settings > Secrets and variables > Actions."
              )

          msg = EmailMessage()
          msg["Subject"] = title
          msg["From"] = smtp_user
          msg["To"] = email_to
          msg.set_content(body)

          if smtp_port == 465:
              with smtplib.SMTP_SSL(smtp_host, smtp_port, timeout=30) as server:
                  server.login(smtp_user, smtp_password)
                  server.send_message(msg)
          else:
              with smtplib.SMTP(smtp_host, smtp_port, timeout=30) as server:
                  server.starttls()
                  server.login(smtp_user, smtp_password)
                  server.send_message(msg)
          PY

      - name: Close stale alert issue
        if: env.HKD_CNY_ALERT != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) =>
              !issue.pull_request && issue.title.startsWith("HKD/CNY")
            );
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: "本次运行未触发高位提醒，自动关闭。"
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
